<?xml version='1.0' encoding='UTF-8'?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" width="1700" height="1050" viewBox="0 0 1700 1050">
<ns0:rect width="100%" height="100%" fill="white" />
<ns0:text x="50" y="67" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">Omejeno izvajalno okolje visoke avtonomije</ns0:text>
<ns0:text x="54" y="104" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="400" fill="#4b5563">Agent je lahko znotraj škatle močan; škatla mora biti zasnovana.</ns0:text>
<ns0:rect x="340" y="190" width="1020" height="630" rx="26" ry="26" fill="#f3f4f6" stroke="#374151" stroke-width="4" />
<ns0:text x="385" y="248" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Namenska VM / sandbox</ns0:text>
<ns0:rect x="410" y="310" width="350" height="155" rx="18" ry="18" fill="#d1fae5" stroke="#047857" stroke-width="3" />
<ns0:text x="434" y="351" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Dovoljeno</ns0:text>
<ns0:text x="434" y="391" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">urejanje repozitorija, lupinski ukazi,</ns0:text>
<ns0:text x="434" y="423" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">testi, lokalne storitve</ns0:text>
<ns0:rect x="930" y="310" width="350" height="155" rx="18" ry="18" fill="#fef3c7" stroke="#b45309" stroke-width="3" />
<ns0:text x="954" y="351" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Nadzorovano</ns0:text>
<ns0:text x="954" y="391" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">omrežje, namestitve paketov,</ns0:text>
<ns0:text x="954" y="423" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">Docker, testni podatki za baze</ns0:text>
<ns0:rect x="410" y="570" width="350" height="155" rx="18" ry="18" fill="#fee2e2" stroke="#b91c1c" stroke-width="3" />
<ns0:text x="434" y="611" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Prepovedano</ns0:text>
<ns0:text x="434" y="651" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">produkcijske skrivnosti, produkcijske</ns0:text>
<ns0:text x="434" y="683" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">baze, nevarne</ns0:text>
<ns0:text x="434" y="715" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">destruktivne tarče</ns0:text>
<ns0:rect x="930" y="570" width="350" height="155" rx="18" ry="18" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3" />
<ns0:text x="954" y="611" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Poročano</ns0:text>
<ns0:text x="954" y="651" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">ukazi, napake, preskočeni</ns0:text>
<ns0:text x="954" y="683" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">testi, tveganja, diffi</ns0:text>
<ns0:text x="80" y="924" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">Visoka avtonomija je odločitev o namestitvi, ne filozofija. Sprejemljiva je samo, kadar je meja izvajalnega okolja eksplicitna.</ns0:text>
</ns0:svg>