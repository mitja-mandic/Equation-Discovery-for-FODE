<ns0:rect x="805" y="250" width="210" height="190" rx="18" ry="18" fill="#fef3c7" stroke="#b45309" stroke-width="3" />
<ns0:text x="829" y="291" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">4. Preveri</ns0:text>
<ns0:text x="829" y="331" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">testi + pregledi</ns0:text>
<ns0:line x1="1025" y1="345" x2="1050" y2="345" stroke="#374151" stroke-width="5" stroke-linecap="round" />
<ns0:polygon points="1050,345 1032,334 1032,356" fill="#374151" />
<ns0:rect x="1050" y="250" width="210" height="190" rx="18" ry="18" fill="#f3f4f6" stroke="#374151" stroke-width="3" />
