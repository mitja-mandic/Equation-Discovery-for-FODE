<ns0:text x="1319" y="331" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">pregledljiv diff</ns0:text>
<ns0:line x1="1515" y1="345" x2="1540" y2="345" stroke="#374151" stroke-width="5" stroke-linecap="round" />
<ns0:polygon points="1540,345 1522,334 1522,356" fill="#374151" />
<ns0:rect x="1540" y="250" width="210" height="190" rx="18" ry="18" fill="#fee2e2" stroke="#b91c1c" stroke-width="3" />
<ns0:text x="1564" y="291" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">7. Odloči</ns0:text>
<ns0:text x="1564" y="331" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">človeško vratce</ns0:text>
<ns0:text x="80" y="584" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">Če naloge ni mogoče pregledati kot koherenten PR, je prevelika ali preveč meglena za delegiranje visoke avtonomije.</ns0:text>
