<ns0:text x="339" y="331" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">sveže iz main</ns0:text>
<ns0:line x1="535" y1="345" x2="560" y2="345" stroke="#374151" stroke-width="5" stroke-linecap="round" />
<ns0:polygon points="560,345 542,334 542,356" fill="#374151" />
<ns0:rect x="560" y="250" width="210" height="190" rx="18" ry="18" fill="#d1fae5" stroke="#047857" stroke-width="3" />
<ns0:text x="584" y="291" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">3. Sprememba</ns0:text>
<ns0:text x="584" y="331" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">majhna</ns0:text>
<ns0:text x="584" y="363" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">implementacija</ns0:text>
<ns0:line x1="780" y1="345" x2="805" y2="345" stroke="#374151" stroke-width="5" stroke-linecap="round" />
