<?xml version='1.0' encoding='UTF-8'?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900">
<ns0:rect width="100%" height="100%" fill="white" />
<ns0:text x="50" y="67" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">Cevovod delegiranja v velikosti PR-ja</ns0:text>
<ns0:text x="54" y="104" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="400" fill="#4b5563">Atomska delovna enota je pregledljiv paket dokazov.</ns0:text>
