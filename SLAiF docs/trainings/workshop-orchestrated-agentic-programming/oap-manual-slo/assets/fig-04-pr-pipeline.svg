<ns0:text x="94" y="291" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">1. Obseg</ns0:text>
<ns0:text x="94" y="331" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">cilj +</ns0:text>
<ns0:text x="94" y="363" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">necilji</ns0:text>
