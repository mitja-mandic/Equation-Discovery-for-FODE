<ns0:text x="1074" y="331" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">dokumenti + handoff</ns0:text>
<ns0:line x1="1270" y1="345" x2="1295" y2="345" stroke="#374151" stroke-width="5" stroke-linecap="round" />
