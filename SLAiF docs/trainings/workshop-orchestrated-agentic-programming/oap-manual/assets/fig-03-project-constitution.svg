<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
<rect width="100%" height="100%" fill="white"/>
<text x="50" y="67" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">The Project Constitution</text>
<text x="54" y="104" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="400" fill="#4b5563">Durable instructions convert fragile prompts into repeatable behavior.</text>
<rect x="270" y="160" width="1060" height="105" rx="18" ry="18" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
<text x="604" y="222" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Mission and product promise</text>
<rect x="298" y="265" width="1004" height="105" rx="18" ry="18" fill="#ede9fe" stroke="#6d28d9" stroke-width="3"/>
<text x="569" y="330" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Architecture and stack boundaries</text>
<rect x="326" y="370" width="948" height="105" rx="18" ry="18" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
<text x="524" y="432" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Security invariants and forbidden actions</text>
<rect x="354" y="475" width="892" height="105" rx="18" ry="18" fill="#d1fae5" stroke="#047857" stroke-width="3"/>
<text x="525" y="537" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Testing, CI, and verification requirements</text>
<rect x="382" y="580" width="836" height="105" rx="18" ry="18" fill="#fef3c7" stroke="#b45309" stroke-width="3"/>
<text x="517" y="643" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Documentation, release, and handoff rules</text>
<rect x="410" y="685" width="780" height="105" rx="18" ry="18" fill="#f3f4f6" stroke="#374151" stroke-width="3"/>
<text x="608" y="747" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Prompt and report templates</text>
<text x="250" y="874" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">A constitution is not a prompt. It is the standing contract every future prompt inherits.</text>
<text x="250" y="914" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563">Examples: AGENTS.md, CLAUDE.md, repository custom instructions, Cursor rules.</text>
</svg>
