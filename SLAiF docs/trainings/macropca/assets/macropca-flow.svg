<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Tok algoritma MacroPCA</title>
  <desc id="desc">Diagram prikazuje povezavo med DDC, imputacijo, robustnim podprostorom in diagnostiko.</desc>
  <rect width="980" height="360" fill="#f6f1e7"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#263c3a"/>
    </marker>
  </defs>
  <g font-family="Georgia, serif" fill="#263c3a">
    <text x="42" y="48" font-size="28">MacroPCA kot nadzorovana sestava gradnikov</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="17" fill="#263c3a">
    <g transform="translate(48 105)">
      <rect width="150" height="92" rx="14" fill="#fffdf8" stroke="#263c3a" stroke-width="2"/>
      <text x="24" y="34" font-weight="700">Vhodna matrika</text>
      <text x="20" y="62">NA + celice</text>
      <text x="20" y="82">+ vrstice</text>
    </g>
    <g transform="translate(258 105)">
      <rect width="150" height="92" rx="14" fill="#e1eadf" stroke="#263c3a" stroke-width="2"/>
      <text x="52" y="34" font-weight="700">DDC</text>
      <text x="18" y="62">celična</text>
      <text x="18" y="82">diagnostika</text>
    </g>
    <g transform="translate(468 105)">
      <rect width="150" height="92" rx="14" fill="#f1d7c7" stroke="#263c3a" stroke-width="2"/>
      <text x="20" y="34" font-weight="700">Imputacija</text>
      <text x="18" y="62">NA in sumljive</text>
      <text x="18" y="82">celice</text>
    </g>
    <g transform="translate(678 105)">
      <rect width="150" height="92" rx="14" fill="#d8e5ef" stroke="#263c3a" stroke-width="2"/>
      <text x="22" y="34" font-weight="700">ROBPCA</text>
      <text x="18" y="62">robusten</text>
      <text x="18" y="82">podprostor</text>
    </g>
    <g transform="translate(390 240)">
      <rect width="200" height="78" rx="14" fill="#fffdf8" stroke="#263c3a" stroke-width="2"/>
      <text x="36" y="32" font-weight="700">Diagnostika</text>
      <text x="20" y="58">residuali, skorji, oznake</text>
    </g>
    <path d="M198 151H250" stroke="#263c3a" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M408 151H460" stroke="#263c3a" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M618 151H670" stroke="#263c3a" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M753 197C735 245 650 278 598 278" stroke="#263c3a" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M490 240C444 220 405 198 383 167" stroke="#263c3a" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  </g>
</svg>
