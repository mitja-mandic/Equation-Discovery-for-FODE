<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Vodnik za karto osamelcev</title>
  <desc id="desc">Karta primerja razdaljo znotraj podprostora in ortogonalno razdaljo.</desc>
  <rect width="900" height="420" fill="#f7f0e4"/>
  <text x="46" y="48" font-family="Georgia, serif" font-size="28" fill="#263c3a">Karta osamelcev loči tipe odstopanja</text>
  <g transform="translate(90 84)">
    <rect width="520" height="270" fill="#fffdf8" stroke="#263c3a" stroke-width="2"/>
    <line x1="70" y1="210" x2="480" y2="210" stroke="#263c3a" stroke-width="2"/>
    <line x1="70" y1="210" x2="70" y2="35" stroke="#263c3a" stroke-width="2"/>
    <line x1="70" y1="115" x2="480" y2="115" stroke="#b55b43" stroke-width="2" stroke-dasharray="7 6"/>
    <line x1="300" y1="210" x2="300" y2="35" stroke="#b55b43" stroke-width="2" stroke-dasharray="7 6"/>
    <g fill="#263c3a" opacity="0.78">
      <circle cx="120" cy="188" r="6"/><circle cx="155" cy="174" r="6"/><circle cx="198" cy="190" r="6"/><circle cx="235" cy="164" r="6"/>
      <circle cx="258" cy="185" r="6"/><circle cx="178" cy="150" r="6"/>
    </g>
    <g fill="#1f6f8b"><circle cx="392" cy="184" r="8"/><circle cx="430" cy="172" r="8"/></g>
    <g fill="#d19024"><circle cx="142" cy="72" r="8"/><circle cx="218" cy="84" r="8"/></g>
    <g fill="#c43c2f"><circle cx="398" cy="72" r="9"/><circle cx="444" cy="92" r="9"/></g>
    <text x="232" y="250" font-family="Arial, sans-serif" font-size="16" fill="#263c3a">score distance</text>
    <text x="-36" y="130" transform="rotate(-90 -36 130)" font-family="Arial, sans-serif" font-size="16" fill="#263c3a">ortogonalna razdalja</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#263c3a">
    <circle cx="666" cy="130" r="7" fill="#263c3a" opacity="0.78"/><text x="690" y="136">regularne točke</text>
    <circle cx="666" cy="172" r="8" fill="#1f6f8b"/><text x="690" y="178">dobre leverage točke</text>
    <circle cx="666" cy="214" r="8" fill="#d19024"/><text x="690" y="220">ortogonalni osamelci</text>
    <circle cx="666" cy="256" r="9" fill="#c43c2f"/><text x="690" y="262">slabe leverage točke</text>
  </g>
</svg>
