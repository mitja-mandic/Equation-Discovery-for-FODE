<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Vodnik za residualno karto</title>
  <desc id="desc">Poenostavljena residualna karta označuje celice z majhnimi in velikimi residuali.</desc>
  <rect width="900" height="360" fill="#f8f1e5"/>
  <text x="48" y="48" font-family="Georgia, serif" font-size="28" fill="#2d3634">Residualna karta lokalizira problematične celice</text>
  <g transform="translate(64 84)">
    <rect width="540" height="210" fill="#fffdf8" stroke="#2d3634" stroke-width="2"/>
    <g stroke="#d8cdbb" stroke-width="1">
      <path d="M60 0V210M120 0V210M180 0V210M240 0V210M300 0V210M360 0V210M420 0V210M480 0V210"/>
      <path d="M0 35H540M0 70H540M0 105H540M0 140H540M0 175H540"/>
    </g>
    <g fill="#f5e7a6">
      <rect x="1" y="1" width="58" height="33"/><rect x="61" y="1" width="58" height="33"/><rect x="121" y="1" width="58" height="33"/>
      <rect x="181" y="1" width="58" height="33"/><rect x="241" y="1" width="58" height="33"/><rect x="301" y="1" width="58" height="33"/>
      <rect x="361" y="1" width="58" height="33"/><rect x="421" y="1" width="58" height="33"/><rect x="481" y="1" width="58" height="33"/>
    </g>
    <rect x="181" y="71" width="58" height="33" fill="#d14a32"/>
    <rect x="421" y="106" width="58" height="33" fill="#d14a32"/>
    <rect x="301" y="176" width="58" height="33" fill="#1f6f8b"/>
    <text x="-40" y="24" font-family="Arial, sans-serif" font-size="14" fill="#2d3634">vrstice</text>
    <text x="230" y="236" font-family="Arial, sans-serif" font-size="14" fill="#2d3634">spremenljivke</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#2d3634">
    <rect x="660" y="116" width="30" height="20" fill="#f5e7a6"/><text x="706" y="133">majhen residual</text>
    <rect x="660" y="158" width="30" height="20" fill="#d14a32"/><text x="706" y="175">pozitiven odklon</text>
    <rect x="660" y="200" width="30" height="20" fill="#1f6f8b"/><text x="706" y="217">negativen odklon</text>
  </g>
  <text x="64" y="328" font-family="Georgia, serif" font-size="18" fill="#5b4b37">Interpretacija: ni pomembna samo osamela vrstica, temveč tudi celice, ki nosijo odstopanje.</text>
</svg>
